name: Build Texas Hold'em APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Buildozer global dir
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-v2-${{ hashFiles('buildozer.spec') }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip wget \
            python3-pip \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev libltdl-dev \
            lld

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0 cython==0.29.37

      - name: Install Android SDK cmdline-tools & accept licenses
        run: |
          # Download cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          mkdir -p $HOME/.buildozer/android/platform/android-sdk/cmdline-tools
          unzip -q cmdline-tools.zip -d $HOME/.buildozer/android/platform/android-sdk/cmdline-tools
          mv $HOME/.buildozer/android/platform/android-sdk/cmdline-tools/cmdline-tools \
             $HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest

          # Create legacy tools symlink for buildozer compatibility
          mkdir -p $HOME/.buildozer/android/platform/android-sdk/tools/bin
          ln -sf $HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager \
                 $HOME/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager

          # Accept all licenses
          yes | $HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true

          # Install build-tools and platform-tools
          $HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-33" \
            "build-tools;33.0.2" \
            "platform-tools"

      - name: Build APK (debug)
        run: |
          buildozer android debug 2>&1 | tee build.log
        env:
          ANDROID_SDK_ROOT: /home/runner/.buildozer/android/platform/android-sdk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: texas-holdem-debug-apk
          path: bin/*.apk
          retention-days: 30

      - name: Show APK info
        run: |
          echo "=== Built APKs ==="
          ls -lh bin/*.apk 2>/dev/null || echo "No APK found, check build.log"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
